services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
    container_name: aip_frontend
    env_file:
      - ./.env
      - ./frontend/.env.example
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - platform

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aip_backend
    env_file:
      - ./.env
      - ./backend/.env.example
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host ${BACKEND_HOST:-0.0.0.0} --port ${BACKEND_PORT:-8000} --reload"
    volumes:
      - ./backend:/app
      - ./infra/ansible:/ansible
      - ./data/logs:/var/log/aip
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${BACKEND_PORT:-8000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aip_worker
    env_file:
      - ./.env
      - ./backend/.env.example
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    volumes:
      - ./backend:/app
      - ./infra/ansible:/ansible
      - ./data/logs:/var/log/aip
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform

  postgres:
    image: postgres:16-alpine
    container_name: aip_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_inference}
      POSTGRES_USER: ${POSTGRES_USER:-ai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_inference"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: aip_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - platform
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

# postgres_data and redis_data are named volumes stored in the WSL2 VHD (Linux FS),
# so PostgreSQL chmod/chown works correctly on Windows/WSL2 hosts.
# They survive "docker compose down" but are wiped by "docker compose down -v".
# Logs are bind-mounted to ./data/logs (file writes only, no permission changes needed).

volumes:
  postgres_data:
  redis_data:

networks:
  platform:
    driver: bridge
